version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: wealth_wellness_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wealth_user
      POSTGRES_PASSWORD: wealth_pass
      POSTGRES_DB: wealth_wellness_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - wealth_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealth_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wealth_wellness_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://wealth_user:wealth_pass@db:5432/wealth_wellness_db
      SECRET_KEY: your-secret-key-change-in-production-use-python-secrets
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      DEBUG: "True"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wealth_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend React Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wealth_wellness_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - wealth_network
    stdin_open: true
    tty: true

volumes:
  postgres_data:
    driver: local

networks:
  wealth_network:
    driver: bridge
